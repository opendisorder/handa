version: 2.1

jobs:
  build-apk:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Full Build
          command: |
            set -ex

            # Install git + curl
            sudo apt-get update -qq
            sudo apt-get install -y -qq git curl xz-utils openjdk-17-jdk

            # Clone repo
            git clone https://github.com/opendisorder/handa.git /home/circleci/handa
            cd /home/circleci/handa

            # Install Android SDK
            export ANDROID_HOME=/home/circleci/android-sdk
            export ANDROID_SDK_ROOT=$ANDROID_HOME
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

            mkdir -p $ANDROID_HOME/cmdline-tools
            curl -sSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
            unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
            mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
            rm cmdline-tools.zip

            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-34" "build-tools;34.0.0" --list 2>&1 | head -5
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses > /dev/null 2>&1 || true

            # Install Flutter
            curl -sSLO https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.29.2-stable.tar.xz
            tar xf flutter_linux_3.29.2-stable.tar.xz -C /home/circleci/
            rm flutter_linux_3.29.2-stable.tar.xz
            export PATH="$PATH:/home/circleci/flutter/bin:/home/circleci/flutter/bin/cache/dart-sdk/bin"
            flutter config --no-analytics

            # Build
            flutter pub get
            dart run build_runner build --delete-conflicting-outputs || true
            flutter build apk --debug --target-platform android-arm64

      - store_artifacts:
          path: /home/circleci/handa/build/app/outputs/flutter-apk/
          destination: handa-apk

workflows:
  version: 2
  build:
    jobs:
      - build-apk:
          filters:
            branches:
              only: main
