version: 2.1

jobs:
  test-docker:
    docker:
      - image: cimg/base:stable
    steps:
      - run: echo "Hello World - Docker executor works!"
      - run: uname -a

  build-apk:
    docker:
      - image: cimg/android:2024.10.1-ndk
    resource_class: medium
    steps:
      - checkout

      - run:
          name: Install Flutter
          command: |
            curl -sSLO https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.44.1-stable.tar.xz
            tar xf flutter_linux_3.44.1-stable.tar.xz -C ~/
            rm flutter_linux_3.44.1-stable.tar.xz
            echo 'export PATH="$HOME/flutter/bin:$HOME/flutter/bin/cache/dart-sdk/bin:$PATH"' >> $BASH_ENV

      - run:
          name: Configure Flutter
          command: |
            export PATH="$HOME/flutter/bin:$HOME/flutter/bin/cache/dart-sdk/bin:$PATH"
            flutter config --no-analytics
            flutter doctor -v

      - run:
          name: Install dependencies
          command: |
            export PATH="$HOME/flutter/bin:$HOME/flutter/bin/cache/dart-sdk/bin:$PATH"
            flutter pub get

      - run:
          name: Generate Drift code
          command: |
            export PATH="$HOME/flutter/bin:$HOME/flutter/bin/cache/dart-sdk/bin:$PATH"
            dart run build_runner build --delete-conflicting-outputs || true

      - run:
          name: Run flutter analyze
          command: |
            export PATH="$HOME/flutter/bin:$HOME/flutter/bin/cache/dart-sdk/bin:$PATH"
            flutter analyze --no-fatal-warnings --no-fatal-infos

      - run:
          name: Build debug APK
          command: |
            export PATH="$HOME/flutter/bin:$HOME/flutter/bin/cache/dart-sdk/bin:$PATH"
            flutter build apk --debug --target-platform android-arm64 --android-skip-build-dependency-validation

      - store_artifacts:
          path: build/app/outputs/flutter-apk/
          destination: handa-apk

workflows:
  version: 2
  build:
    jobs:
      - test-docker
      - build-apk:
          requires:
            - test-docker
          filters:
            branches:
              only: main
