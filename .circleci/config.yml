version: 2.1

jobs:
  build-apk:
    docker:
      - image: cimg/base:stable
    resource_class: medium
    environment:
      ANDROID_HOME: /home/circleci/android-sdk
      ANDROID_SDK_ROOT: /home/circleci/android-sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    steps:
      - checkout

      - run:
          name: Install Java & tools
          command: |
            sudo apt-get update -qq
            sudo apt-get install -y -qq openjdk-17-jdk xz-utils
            java -version

      - run:
          name: Install Android SDK
          command: |
            mkdir -p $ANDROID_HOME/cmdline-tools
            curl -sSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
            unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
            mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
            rm cmdline-tools.zip
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-34" "build-tools;34.0.0" > /dev/null

      - run:
          name: Export Android SDK path
          command: |
            echo 'export ANDROID_HOME=$ANDROID_HOME' >> $BASH_ENV
            echo 'export PATH=$PATH:$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin' >> $BASH_ENV

      - run:
          name: Install Flutter SDK
          command: |
            curl -sSLO https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.29.2-stable.tar.xz
            tar xf flutter_linux_3.29.2-stable.tar.xz -C /home/circleci/
            echo 'export PATH="$PATH:/home/circleci/flutter/bin:/home/circleci/flutter/bin/cache/dart-sdk/bin"' >> $BASH_ENV
            rm flutter_linux_3.29.2-stable.tar.xz

      - run:
          name: Accept licenses
          command: |
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses > /dev/null 2>&1 || true

      - run:
          name: Flutter pub get
          command: |
            export PATH="$PATH:/home/circleci/flutter/bin:/home/circleci/flutter/bin/cache/dart-sdk/bin"
            flutter pub get

      - run:
          name: Build Runner
          command: |
            export PATH="$PATH:/home/circleci/flutter/bin:/home/circleci/flutter/bin/cache/dart-sdk/bin"
            dart run build_runner build --delete-conflicting-outputs

      - run:
          name: Build APK
          command: |
            export PATH="$PATH:/home/circleci/flutter/bin:/home/circleci/flutter/bin/cache/dart-sdk/bin"
            flutter build apk --debug --target-platform android-arm64

      - store_artifacts:
          path: build/app/outputs/flutter-apk/
          destination: handa-apk

workflows:
  build:
    jobs:
      - build-apk:
          filters:
            branches:
              only: main
