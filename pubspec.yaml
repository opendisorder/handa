name: handa
description: "Handa (හඬ) - Stroke speech rehabilitation app for Sinhala speakers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database (SQLite via Drift)
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  sqlite3: ^2.7.4

  # Networking
  http: ^1.3.0
  web_socket_channel: ^3.0.2
  connectivity_plus: ^6.1.2

  # Serialization
  json_annotation: ^4.12.0
  uuid: ^4.5.1
  equatable: ^2.0.7
  collection: ^1.19.1

  # Charts
  fl_chart: ^0.70.2

  # PDF export
  pdf: ^3.11.2
  printing: ^5.14.2
  share_plus: ^10.1.4

  # Audio
  record: ^5.2.0
  flutter_tts: ^4.2.2
  audioplayers: ^6.4.0

  # Vertex AI Gemini Live API (vendored fork with OAuth2 + camelCase)
  gemini_live_fork:
    path: packages/gemini_live_fork

  # Permissions
  permission_handler: ^11.3.1

  # Platform
  intl: ^0.20.2
  path: ^1.9.1

  # Security
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6

  # UI helpers
  scroll_to_hide: ^1.0.2

dependency_overrides:
  json_annotation: ^4.12.0
  record_linux: 1.3.1
  record_platform_interface: 1.5.0
  flutter_tts: 4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  drift_dev: ^2.25.1
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

  # Linting
  flutter_lints: ^5.0.0

  # Testing
  mocktail: ^1.0.4
  record_platform_interface: ^1.6.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/categories/

  fonts:
    - family: NotoSansSinhala
      fonts:
        - asset: assets/fonts/NotoSansSinhala[wdth,wght].ttf
          weight: 400
    - family: NotoSansSinhala
      fonts:
        - asset: assets/fonts/NotoSansSinhala[wdth,wght].ttf
          weight: 700
